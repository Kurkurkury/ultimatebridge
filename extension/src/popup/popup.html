<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>UltimateBridge</title>
</head>
<body>
  <h3>UltimateBridge</h3>
  <button id="run-smoke">Run native read-only smoke</button>
  <button id="detect-latest">Run latest ChatGPT bridge block</button>
  <button id="refresh-queue">Refresh delivery queue</button>
  <button id="clear-queue">Clear queue</button>
  <button id="prepare-upload">Prepare latest artifact upload</button>
  <button id="copy-upload-plan">Copy upload plan</button>
  <button id="clear-upload-plan">Clear upload plan</button>
  <h4>Last result</h4>
  <pre id="status">Ready.</pre>
  <h4>Delivery queue</h4>
  <pre id="queue">Loading...</pre>
  <h4>User-confirmed artifact upload plan</h4>
  <pre id="upload-plan">No artifact upload plan prepared.</pre>
  <script type="module" src="popup.js"></script>
</body>
</html>
